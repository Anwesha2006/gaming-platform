<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" fill="none">
  <defs>
    <linearGradient id="wood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d2817"/>
      <stop offset="50%" stop-color="#5c3d24"/>
      <stop offset="100%" stop-color="#2a1a0e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a227"/>
      <stop offset="50%" stop-color="#f5d76e"/>
      <stop offset="100%" stop-color="#a67c00"/>
    </linearGradient>
    <linearGradient id="lid" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4a3020"/>
      <stop offset="100%" stop-color="#6b4528"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Base shadow -->
  <ellipse cx="160" cy="258" rx="110" ry="14" fill="#000" opacity="0.45"/>
  <!-- Chest body -->
  <path d="M50 130 L50 230 Q50 245 65 245 L255 245 Q270 245 270 230 L270 130 Z" fill="url(#wood)" stroke="url(#gold)" stroke-width="3"/>
  <!-- Body bands -->
  <rect x="50" y="155" width="220" height="8" fill="url(#gold)" opacity="0.9"/>
  <rect x="50" y="195" width="220" height="8" fill="url(#gold)" opacity="0.9"/>
  <!-- Corner accents -->
  <rect x="50" y="130" width="14" height="115" fill="#e8e8f0" rx="2"/>
  <rect x="256" y="130" width="14" height="115" fill="#e8e8f0" rx="2"/>
  <!-- Lock plate -->
  <rect x="140" y="175" width="40" height="36" rx="4" fill="url(#gold)" filter="url(#glow)"/>
  <circle cx="160" cy="193" r="8" fill="#3d2817"/>
  <rect x="156" y="193" width="8" height="14" rx="2" fill="#3d2817"/>
  <!-- Lid -->
  <path d="M40 130 Q40 80 160 55 Q280 80 280 130 L270 130 Q270 95 160 70 Q50 95 50 130 Z" fill="url(#lid)" stroke="url(#gold)" stroke-width="3"/>
  <!-- Lid band -->
  <path d="M55 115 Q160 88 265 115" stroke="url(#gold)" stroke-width="6" fill="none"/>
  <!-- Coins spilling -->
  <circle cx="90" cy="248" r="10" fill="url(#gold)"/>
  <circle cx="115" cy="252" r="8" fill="url(#gold)"/>
  <circle cx="200" cy="250" r="9" fill="url(#gold)"/>
  <circle cx="225" cy="253" r="7" fill="url(#gold)"/>
  <circle cx="175" cy="255" r="6" fill="url(#gold)"/>
  <!-- Skull accent -->
  <circle cx="130" cy="252" r="11" fill="#d4c4a8" opacity="0.7"/>
  <circle cx="126" cy="250" r="2.5" fill="#2a1a0e"/>
  <circle cx="134" cy="250" r="2.5" fill="#2a1a0e"/>
  <!-- Blade leaning -->
  <path d="M240 80 L248 60 L252 62 L244 82 Z" fill="#7eb8da"/>
  <path d="M244 82 L252 62 L255 245 L247 245 Z" fill="url(#gold)" opacity="0.85"/>
  <path d="M247 245 L255 245 L256 250 L248 250 Z" fill="#5c3d24"/>
</svg>
